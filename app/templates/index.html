<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>URL Shortener</title>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Segoe UI', sans-serif;
            }

            body {
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: linear-gradient(135deg, #0f172a, #1e293b);
                color: white;
            }

            .container {
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(12px);
                padding: 40px;
                border-radius: 20px;
                width: 400px;
                text-align: center;
                box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            }

            h1 {
                margin-bottom: 20px;
                font-weight: 600;
                letter-spacing: 1px;
            }

            input {
                width: 100%;
                padding: 12px;
                margin: 8px 0;
                border-radius: 10px;
                border: none;
                outline: none;
                background: rgba(255,255,255,0.1);
                color: white;
            }

            input::placeholder {
                color: #aaa;
            }

            button {
                width: 100%;
                padding: 12px;
                margin-top: 10px;
                border: none;
                border-radius: 10px;
                background: #6366f1;
                color: white;
                font-weight: bold;
                cursor: pointer;
                transition: 0.3s;
            }

            button:hover {
                background: #4f46e5;
            }

            button:disabled {
                background: #444;
                cursor: not-allowed;
            }

            #result {
                margin-top: 20px;
                word-break: break-all;
            }

            a {
                color: #38bdf8;
                text-decoration: none;
            }

            .loading {
                margin-top: 15px;
                font-size: 14px;
                color: #aaa;
                display: none;
            }

            .spinner {
                margin: 10px auto;
                width: 25px;
                height: 25px;
                border: 3px solid rgba(255,255,255,0.2);
                border-top: 3px solid white;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>

    </head>
    <body>

        <div class="container">
            <h1>Shorten Your Link</h1><br/>

            <input id="url" placeholder="Paste your long URL here...">
            <input id="custom" placeholder="Custom link (optional)">

            <button id="btn" onclick="shorten()">Shorten</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                Processing...
            </div>

            <div id="result"></div>
        </div>

        <script>
            function isValidURL(str) {
                try {
                    new URL(str);
                    return true;
                } catch (_) {
                    return false;
                }
            }

            async function shorten() {
                const url = document.getElementById("url").value.trim();
                const custom = document.getElementById("custom").value.trim();
                const btn = document.getElementById("btn");
                const result = document.getElementById("result");
                const loading = document.getElementById("loading");

                if (!url) {
                    result.innerText = "⚠️ URL tidak boleh kosong!";
                    return;
                }

                if (!isValidURL(url)) {
                    result.innerText = "⚠️ Masukkan URL yang valid!\n(contoh: https://google.com)";
                    return;
                }

                btn.disabled = true;
                btn.innerText = "Please wait...";
                loading.style.display = "block";
                result.innerHTML = "";

                try {
                    const response = await fetch("/shorten", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            url: url,
                            custom_code: custom || null
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        const fullUrl = window.location.origin + "/" + data.short_url;

                        result.innerHTML = `
                            <p>✨ Your short link:</p>
                            <a href="${fullUrl}" target="_blank">${fullUrl}</a>
                            <br><br>
                            <button onclick="copy('${fullUrl}')">Copy</button>
                        `;
                    } else {
                        result.innerText = data.detail;
                    }

                } catch (err) {
                    result.innerText = "Something went wrong...";
                }

                btn.disabled = false;
                btn.innerText = "Shorten";
                loading.style.display = "none";
            }
        </script>

    </body>
</html>
